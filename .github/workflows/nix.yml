name: Nix

on:
  push:
    branches: [main, master]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - "nix/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "man/**"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - "nix/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "man/**"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake:
    name: nix flake check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Show flake metadata
        run: nix flake metadata
      - name: Flake check
        run: nix flake check --print-build-logs
      - name: Build default package
        run: nix build .#nmdns --print-build-logs
      - name: Smoke test built binary
        run: ./result/bin/nmdns --help
      - name: Push to S3 cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.S3_NIX_CACHE_URL != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          nix copy --to "${{ vars.S3_NIX_CACHE_URL }}" ./result
