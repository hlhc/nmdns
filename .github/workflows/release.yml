name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.resolve.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi

  build-binaries:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          tag="${{ needs.create-release.outputs.tag }}"
          name="nmdns-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp target/${{ matrix.target }}/release/nmdns "${staging}/"
          cp README.md LICENSE-APACHE LICENSE-MIT "${staging}/"
          cp -r man "${staging}/"
          cp examples/nmdns.toml "${staging}/nmdns.example.toml"
          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-assets
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 1

  nix-build:
    name: nix build (${{ matrix.system }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            os: ubuntu-latest
          - system: aarch64-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Configure S3 substituter
        if: vars.S3_NIX_CACHE_URL != ''
        run: |
          mkdir -p ~/.config/nix
          echo "extra-substituters = ${{ vars.S3_NIX_CACHE_URL }}" >> ~/.config/nix/nix.conf
          echo "extra-trusted-public-keys = ${{ vars.NIX_CACHE_PUBLIC_KEY }}" >> ~/.config/nix/nix.conf
      - run: nix build .#nmdns --print-build-logs
      - name: Package nix artifact
        shell: bash
        run: |
          tag="${{ needs.create-release.outputs.tag }}"
          name="nmdns-${tag}-${{ matrix.system }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp -r result/bin "${staging}/"
          cp -r result/share "${staging}/" 2>/dev/null || true
          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.system }}-assets
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 1

  upload-release:
    name: Create GitHub release
    needs: [create-release, build-binaries, nix-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          name: ${{ needs.create-release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
