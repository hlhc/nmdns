name: Bug report
description: Report a defect in nmdns
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        information as you can — incomplete reports may be closed.

  - type: input
    id: version
    attributes:
      label: nmdns version
      description: Output of `nmdns --version` (or git commit hash if built from source).
      placeholder: "nmdns 0.2.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system & kernel
      description: e.g. `Debian 12 / Linux 6.1.0-13-amd64`, `NixOS 24.05`, `macOS 14.5`.
    validations:
      required: true

  - type: input
    id: install
    attributes:
      label: Install method
      description: e.g. `nix flake`, `cargo install`, distro package, prebuilt release tarball.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimum sequence of commands / config that reproduces the issue.
      placeholder: |
        1. nmdns -c ./bug.toml
        2. ...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration file
      description: Sanitized contents of your `nmdns.toml`.
      render: toml

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output with `RUST_LOG=nmdns=debug` if possible.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have tried to reproduce on the latest released version.
          required: false
